# ==================== MQTT 协议配置 ====================
mqtt {
  max_packet_size = 1MB
  max_topic_levels = 128
  max_qos_allowed = 2
  retain_available = true
  wildcard_subscription = true
  shared_subscription = true
}

# ==================== 授权配置 ====================
# 默认拒绝所有操作（安全优先）
authorization {
  no_match = "deny"
  deny_action = "disconnect"
  
  # 使用 ACL 文件授权
  sources = [
    {
      type = file
      enable = true
      path = "/opt/emqx/etc/acl.conf"
    }
  ]
}

# ==================== Dashboard ====================
dashboard {
  listeners.http {
    bind = "0.0.0.0:18083"
  }
  default_username = "admin"
  default_password = "buildroot123"
}

# ==================== 日志配置 ====================
log {
  console {
    enable = true
    level = info
  }
  file {
    enable = true
    level = info
    path = "/opt/emqx/log/emqx.log"
    rotation_count = 10
    rotation_size = 50MB
  }
}

# ==================== 会话配置 ====================
session {
  max_subscriptions = 1000
  max_inflight = 128
  retry_interval = "30s"
  max_awaiting_rel = 100
  await_rel_timeout = "300s"
  session_expiry_interval = "2h"
  max_mqueue_len = 10000
}