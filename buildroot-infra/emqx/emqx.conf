# EMQX 5.5.0 配置文件
# 用于 Buildroot Agent Device Twin

# ==================== 基础配置 ====================
node {
  name = "buildroot-emqx@0.0.0.0"
  cookie = "buildroot-secret-cookie"
  data_dir = "data"
}

# ==================== 监听器配置 ====================
# TCP (MQTT)
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 102400
}

# WebSocket
listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 102400
}

