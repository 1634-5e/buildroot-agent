# Buildroot Agent Prometheus 配置

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'buildroot-agent'

# 告警规则文件
rule_files:
  - /etc/prometheus/rules/*.yml

# 抓取配置
scrape_configs:
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # EMQX Exporter
  - job_name: 'emqx'
    static_configs:
      - targets: ['emqx-exporter:8085']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'emqx'

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgres'

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis'

  # Server API (Python - 端口 8000)
  - job_name: 'buildroot-server-python'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'server-python'

  # Server API (Rust - 端口 8001)
  - job_name: 'buildroot-server-rust'
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'server-rust'