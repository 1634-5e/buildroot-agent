<!DOCTYPE html>
<html>
<head>
  <title>WebSocket Test (Binary Protocol)</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a24; color: #f0f0f5; }
    #log { margin-top: 20px; background: #0d0d12; padding: 15px; border-radius: 4px; max-height: 400px; overflow-y: auto; }
    button { padding: 10px 20px; margin: 10px; background: #6366f1; border: none; color: white; cursor: pointer; }
    button:hover { background: #818cf8; }
    .log-entry { margin: 5px 0; padding: 5px; border-left: 3px solid #3a3a4a; }
    .log-entry.connect { border-left-color: #10b981; }
    .log-entry.disconnect { border-left-color: #ef4444; }
    .log-entry.message { border-left-color: #6366f1; }
    .log-entry.error { border-left-color: #f59e0b; }
    #status { margin: 10px 0; padding: 10px; background: #2a2a3a; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>WebSocket 二进制协议测试</h1>
  <div id="status">状态: 未连接</div>
  <div>
    <button onclick="connect()">连接</button>
    <button onclick="disconnect()">断开</button>
    <button onclick="testPTYCreate()">测试 PTY_CREATE</button>
    <button onclick="testPTYData()">测试 PTY_DATA</button>
    <button onclick="clearLog()">清空日志</button>
  </div>
  <div id="log"></div>

  <script>
    let ws = null
    const WS_URL = 'ws://localhost:8765'  // 直接连接，不使用代理

    // 消息类型常量
    const MessageType = {
      PTY_CREATE: 0x10,
      PTY_DATA: 0x11,
      PTY_RESIZE: 0x12,
      PTY_CLOSE: 0x13,
    }

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log')
      const entry = document.createElement('div')
      entry.className = `log-entry ${type}`
      const time = new Date().toLocaleTimeString()
      entry.textContent = `[${time}] ${message}`
      logDiv.appendChild(entry)
      logDiv.scrollTop = logDiv.scrollHeight
      console.log(`[${type}] ${message}`)
    }

    function updateStatus(status) {
      document.getElementById('status').textContent = `状态: ${status}`
      log(status, status === '已连接' ? 'connect' : 'disconnect')
    }

    /**
     * 编码消息为二进制格式
     * 格式: [msg_type: 1字节] [length: 2字节大端序] [json_data]
     */
    function encodeMessage(msgType, data) {
      // 将数据转换为 JSON
      const jsonData = typeof data === 'object' ? data : { data }
      const jsonString = JSON.stringify(jsonData)
      const jsonBytes = new TextEncoder().encode(jsonString)
      const jsonLen = jsonBytes.length

      // 创建消息缓冲区: [msg_type] [len_hi] [len_lo] [json_data]
      const buffer = new Uint8Array(3 + jsonLen)
      buffer[0] = msgType
      buffer[1] = (jsonLen >> 8) & 0xFF  // 高字节
      buffer[2] = jsonLen & 0xFF           // 低字节
      buffer.set(jsonBytes, 3)

      console.log('Encoded message:', {
        msgType: '0x' + msgType.toString(16).padStart(2, '0'),
        jsonLen,
        bufferHex: Array.from(buffer).map(b => b.toString(16).padStart(2, '0')).join(' ')
      })

      return buffer
    }

    function connect() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        log('已经连接', 'info')
        return
      }

      log('正在连接到 ' + WS_URL, 'info')
      ws = new WebSocket(WS_URL, 'binary')  // 指定二进制协议

      ws.onopen = () => {
        log('WebSocket 连接成功', 'connect')
        updateStatus('已连接')
      }

      ws.onmessage = (event) => {
        try {
          const rawData = event.data
          const buffer = new Uint8Array(rawData)

          // 解析消息头
          if (buffer.length < 3) {
            log('消息太短', 'error')
            return
          }

          const msgType = buffer[0]
          const jsonLen = (buffer[1] << 8) | buffer[2]

          if (buffer.length < 3 + jsonLen) {
            log(`消息不完整: 期望 ${3 + jsonLen} 字节，实际 ${buffer.length} 字节`, 'error')
            return
          }

          // 解析 JSON 数据
          const jsonBytes = buffer.slice(3, 3 + jsonLen)
          const jsonString = new TextDecoder().decode(jsonBytes)
          const message = JSON.parse(jsonString)

          log(`收到消息 (0x${msgType.toString(16).padStart(2, '0')}): ${JSON.stringify(message)}`, 'message')
          console.log('Message data:', message)
        } catch (e) {
          log(`解析消息失败: ${e.message}`, 'error')
          console.error('Parse error:', e)
        }
      }

      ws.onclose = (event) => {
        log(`WebSocket 关闭: code=${event.code}, reason=${event.reason}`, 'disconnect')
        updateStatus('未连接')
      }

      ws.onerror = (error) => {
        log('WebSocket 错误', 'error')
        console.error('WebSocket error:', error)
      }
    }

    function disconnect() {
      if (ws) {
        ws.close(1000, 'User disconnecting')
        ws = null
      }
    }

    function testPTYCreate() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('WebSocket 未连接', 'error')
        return
      }

      const sessionId = Math.floor(Math.random() * 1000000000)
      const message = encodeMessage(MessageType.PTY_CREATE, {
        session_id: sessionId,
        rows: 24,
        cols: 80
      })

      log(`发送 PTY_CREATE: session_id=${sessionId}`, 'info')
      ws.send(message)
    }

    function testPTYData() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('WebSocket 未连接', 'error')
        return
      }

      const sessionId = 123456
      const testData = 'ls -la\n'
      const base64Data = btoa(testData)

      const message = encodeMessage(MessageType.PTY_DATA, {
        session_id: sessionId,
        data: base64Data
      })

      log(`发送 PTY_DATA: session_id=${sessionId}`, 'info')
      ws.send(message)
    }

    function clearLog() {
      document.getElementById('log').innerHTML = ''
    }
  </script>
</body>
</html>
