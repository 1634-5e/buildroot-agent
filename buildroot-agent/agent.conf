# Buildroot Agent Configuration
# Generated automatically

# 服务器地址 (host:port)
server_addr = "127.0.0.1:8766"

# 设备ID (唯一标识)
device_id = "3782bc74f03f487f93a91308de543726"

# 认证Token
auth_token = ""

# 心跳间隔 (秒)
heartbeat_interval = 30

# 重连间隔 (秒)
reconnect_interval = 5

# 状态上报间隔 (秒)
status_interval = 60

# 统一运行时数据目录
data_dir = "/opt/buildroot-agent"

# 日志目录
log_path = "/opt/buildroot-agent"

# 脚本存放目录
script_path = "/opt/buildroot-agent"

# 是否启用PTY (远程Shell)
enable_pty = true

# 是否启用脚本执行
enable_script = true

# 日志级别 (debug, info, warn, error)
log_level = info

# 是否使用SSL加密
use_ssl = false

# CA证书路径（留空使用系统证书）
ca_path = ""

# 更新配置
# 是否启用自动更新
enable_auto_update = true

# 更新检查间隔（秒，默认86400=24小时）
update_check_interval = 86400

# 更新渠道
update_channel = stable

# 更新前是否需要确认
update_require_confirm = true

# 临时文件路径
update_temp_path = "/opt/buildroot-agent"

# 备份路径
update_backup_path = "/opt/buildroot-agent"

# 失败是否自动回滚
update_rollback_on_fail = true

# 回滚超时（秒，默认300=5分钟）
update_rollback_timeout = 300

# 是否校验文件校验和
update_verify_checksum = true

# 更新CA证书路径（可选，留空使用系统证书）
update_ca_cert_path = ""
