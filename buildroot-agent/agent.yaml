# Buildroot Agent Configuration (YAML)
# 
# 使用说明：
# 1. 复制此文件为 agent.yaml: cp agent.yaml.example agent.yaml
# 2. 根据实际情况修改配置项
# 3. 运行 agent: ./buildroot-agent -c ./agent.yaml
# 
# 此文件由程序自动生成，请勿手动编辑默认值
# 修改默认值请编辑 include/agent.h 中的 DEFAULT_* 宏定义
server:
  addr: "127.0.0.1:8766"
  use_ssl: false
  ca_path: ""

device:
  id: ""

connection:
  heartbeat_interval: 30
  reconnect_interval: 5
  status_interval: 60

paths:
  log: "./log"
  script: "./scripts"
  update_temp: "./tmp"
  update_backup: "./backup"

features:
  pty: true
  script: true
  auto_update: false

update:
  check_interval: 1800
  channel: "stable"
  require_confirm: true
  rollback_on_fail: true
  rollback_timeout: 300
  verify_checksum: true

ping:
  enable: false
  interval: 60
  timeout: 5
  count: 4

logging:
  level: "info"
