# Buildroot Agent Configuration (libconfig)
# 
# 使用说明：
# 1. 根据实际情况修改配置项
# 2. 运行 agent: ./buildroot-agent -c ./agent.cfg
# 
# 此文件由程序自动生成，请勿手动编辑默认值
# 修改默认值请编辑 include/agent.h 中的 DEFAULT_* 宏定义
server:
{
    addr = "127.0.0.1:8766"
    use_ssl = false
    ca_path = ""
}

device:
{
    id = "device-05a9d43c1592"
}

connection:
{
    heartbeat_interval = 30
    reconnect_interval = 5
    status_interval = 60
}

paths:
{
    log = "./log"
    script = "./scripts"
    update_temp = "./tmp"
    update_backup = "./backup"
}

features:
{
    pty = true
    script = true
    auto_update = false
}

update:
{
    check_interval = 1800
    channel = "stable"
    require_confirm = true
    rollback_on_fail = true
    rollback_timeout = 300
    verify_checksum = true
}

ping:
{
    enable = true
    interval = 60
    timeout = 5
    count = 4
    targets = (
        {
            ip = "192.168.0.249"
            name = "路由器"
        },
        {
            ip = "192.168.195.200"
            name = "交换机"
        }
    )
}

