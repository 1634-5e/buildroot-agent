# Postmortem Trigger - PR 合并后触发 Postmortem Generator
# 通过 workflow_dispatch 触发，避免 opencode 不支持 repository_dispatch

name: Postmortem Trigger

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  dispatch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Postmortem Generator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run postmortem-generate.yml \
            -f pr_number="${{ github.event.pull_request.number }}" \
            -f pr_title="${{ github.event.pull_request.title }}" \
            -f pr_url="${{ github.event.pull_request.html_url }}"
          
          echo "✅ Postmortem Generator triggered for PR #${{ github.event.pull_request.number }}"