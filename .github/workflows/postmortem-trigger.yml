# Postmortem Trigger - PR 合并后触发 Postmortem Generator
# 通过 repository_dispatch 解耦，避免 opencode checkout 已删除的 PR 分支

name: Postmortem Trigger

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  dispatch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Postmortem Generator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用 jq 安全构建 JSON，避免 JSON 注入风险
          payload=$(jq -n \
            --argjson pr_num "${{ github.event.pull_request.number }}" \
            --arg pr_title "${{ github.event.pull_request.title }}" \
            --arg pr_url "${{ github.event.pull_request.html_url }}" \
            '{pr_number: $pr_num, pr_title: $pr_title, pr_url: $pr_url}')
          
          gh api repos/${{ github.repository }}/dispatches \
            -f event_type=postmortem-generate \
            -F client_payload="$payload"
          
          echo "✅ Postmortem Generator triggered for PR #${{ github.event.pull_request.number }}"
