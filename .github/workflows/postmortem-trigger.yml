# Postmortem Trigger - CI 所有 check 通过后触发 opencode

name: Postmortem Trigger

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, develop]

permissions:
  pull-requests: write
  actions: read
  contents: read

jobs:
  trigger:
    # 只在 CI 成功时触发
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR number from workflow run
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取触发 workflow 的 commit SHA
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Head SHA: $SHA"
          
          # 查找对应的 PR
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls \
            --jq ".[] | select(.head.sha == \"$SHA\") | {number, title, state}")
          
          if [ -z "$PR_DATA" ]; then
            echo "No PR found for this commit"
            echo "pr_number=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
          PR_STATE=$(echo "$PR_DATA" | jq -r '.state')
          
          echo "PR Number: $PR_NUMBER"
          echo "PR State: $PR_STATE"
          
          # 只处理 open 状态的 PR
          if [ "$PR_STATE" != "open" ]; then
            echo "PR is not open, skipping"
            echo "pr_number=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Check all required checks passed
        if: steps.pr.outputs.pr_number != ''
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          
          # 获取 PR 的所有 check 状态
          CHECKS=$(gh api repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/check-runs \
            --jq '.check_runs[] | select(.status == "completed") | .conclusion')
          
          echo "Check conclusions:"
          echo "$CHECKS"
          
          # 检查是否有失败的 check
          if echo "$CHECKS" | grep -q -E "^(failure|timed_out|cancelled)$"; then
            echo "Some checks failed or were cancelled"
            echo "all_passed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "all_passed=true" >> $GITHUB_OUTPUT

      - name: Comment to trigger opencode
        if: steps.pr.outputs.pr_number != '' && steps.check.outputs.all_passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          echo "All checks passed for PR #$PR_NUMBER, triggering opencode..."
          
          gh pr comment $PR_NUMBER --repo ${{ github.repository }} --body "/opencode update-postmortem"