# Postmortem Generator - 通过 PR 评论触发

name: Postmortem Generator

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  generate:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run OpenCode Postmortem Generator
        uses: anomalyco/opencode/github@latest
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: bailian/glm-5
          use_github_token: true