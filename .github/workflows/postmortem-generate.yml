# Release 后自动生成 postmortem 报告 (AI 增强版)
# 在 Release 发布时自动运行

name: Postmortem Generator

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      from_tag:
        description: 'From tag (previous release)'
        required: false
      to_tag:
        description: 'To tag (current release)'
        required: false

env:
  BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
  BAILIAN_MODEL: ${{ secrets.BAILIAN_MODEL || 'qwen-coder-plus' }}

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-postmortem:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FROM_TAG="${{ inputs.from_tag }}"
            TO_TAG="${{ inputs.to_tag || github.sha }}"
          else
            TO_TAG="${{ github.event.release.tag_name }}"
            FROM_TAG=$(git tag --sort=-version:refname | grep -v "$TO_TAG" | head -1)
          fi
          
          echo "from_tag=$FROM_TAG" >> $GITHUB_OUTPUT
          echo "to_tag=$TO_TAG" >> $GITHUB_OUTPUT
          echo "range=$FROM_TAG...$TO_TAG" >> $GITHUB_OUTPUT

      - name: Collect fix commits
        id: commits
        run: |
          RANGE="${{ steps.range.outputs.range }}"
          TODAY=$(date +%Y-%m-%d)
          
          FIX_COMMITS=$(git log $RANGE --oneline --grep="fix" 2>/dev/null || echo "")
          
          if [ -z "$FIX_COMMITS" ]; then
            echo "has_fixes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "has_fixes=true" >> $GITHUB_OUTPUT
          echo "date=$TODAY" >> $GITHUB_OUTPUT
          echo "$FIX_COMMITS" > /tmp/fix_commits.txt
          
          # 获取详细 diff
          git log $RANGE -p --grep="fix" > /tmp/fix_diff.txt 2>/dev/null || true
          
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/fix_commits.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Load existing postmortems
        if: steps.commits.outputs.has_fixes == 'true'
        run: |
          mkdir -p /tmp/context
          if [ -d "postmortem" ]; then
            cp postmortem/*.md /tmp/context/ 2>/dev/null || true
          fi

      - name: AI Generate Postmortem
        id: ai
        if: steps.commits.outputs.has_fixes == 'true' && env.BAILIAN_API_KEY != ''
        run: |
          RANGE="${{ steps.range.outputs.range }}"
          TO_TAG="${{ steps.range.outputs.to_tag }}"
          TODAY="${{ steps.commits.outputs.date }}"
          
          # 构建 prompt
          cat > /tmp/prompt.json << EOF
          {
            "model": "$BAILIAN_MODEL",
            "messages": [
              {
                "role": "system",
                "content": "你是专业的软件工程 postmortem 分析专家。根据 git fix commits 生成结构化的复盘报告。"
              },
              {
                "role": "user",
                "content": "请分析以下 fix commits 并生成 postmortem 报告:\n\n版本: $TO_TAG\n日期: $TODAY\n\nCommits:\n$(cat /tmp/fix_commits.txt | head -20)\n\nDiff (前 3000 行):\n$(head -3000 /tmp/fix_diff.txt)\n\n要求:\n1. 问题概述\n2. 根因分析\n3. 修复方案\n4. 预防措施\n5. 检测模式\n6. 严重程度 (P0/P1/P2)\n\n使用 Markdown 格式输出。"
              }
            ],
            "temperature": 0.3,
            "max_tokens": 3000
          }
          EOF
          
          RESPONSE=$(curl -s -X POST "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions" \
            -H "Authorization: Bearer $BAILIAN_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/prompt.json)
          
          AI_REPORT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "生成失败"')
          
          cat > /tmp/postmortem.md << EOF
          # Postmortem: Release $TO_TAG

          **生成日期**: $TODAY  
          **版本范围**: \`$RANGE\`  
          **生成方式**: 🤖 AI 自动分析

          ---

          $AI_REPORT
          EOF

      - name: Fallback generation
        if: steps.commits.outputs.has_fixes == 'true' && env.BAILIAN_API_KEY == ''
        run: |
          TODAY="${{ steps.commits.outputs.date }}"
          TO_TAG="${{ steps.range.outputs.to_tag }}"
          
          cat > /tmp/postmortem.md << EOF
          # Postmortem: Release $TO_TAG

          **生成日期**: $TODAY  
          **版本范围**: \`${{ steps.range.outputs.range }}\`  
          **生成方式**: 📋 规则匹配

          ---

          ## Fix Commits

          \`\`\`
          $(cat /tmp/fix_commits.txt)
          \`\`\`

          ## 问题分类

          $(grep -iE "security|xss" /tmp/fix_commits.txt && echo "### 🔴 安全相关" || true)
          $(grep -iE "race|lock|concurrent" /tmp/fix_commits.txt && echo "### 🔴 并发相关" || true)
          $(grep -iE "ci|test|timeout" /tmp/fix_commits.txt && echo "### 🟡 CI/测试相关" || true)
          EOF

      - name: Create file and PR
        if: steps.commits.outputs.has_fixes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "docs: Add postmortem for release ${{ steps.range.outputs.to_tag }}"
          body: |
            ## 📋 Postmortem 自动生成
            
            Release: ${{ steps.range.outputs.to_tag }}
            范围: ${{ steps.range.outputs.range }}
            
            请审核后合并。
          branch: postmortem/${{ steps.range.outputs.to_tag }}
          commit-message: "docs: add postmortem for release ${{ steps.range.outputs.to_tag }}"
          labels: documentation,postmortem
          files: |
            postmortem/${{ steps.commits.outputs.date }}-release-${{ steps.range.outputs.to_tag }}.md
            postmortem/README.md