# Postmortem Generator - 使用 OpenCode 自动生成复盘报告
# 在 Release 发布后自动运行

name: Postmortem Generator

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      from_tag:
        description: 'From tag (previous release)'
        required: false
      to_tag:
        description: 'To tag (current release)'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # Release 后自动生成
  generate-on-release:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run OpenCode Postmortem Generator
        uses: anomalyco/opencode/github@latest
        with:
          model: alibaba/qwen-coder-plus
          prompt: |
            你是软件工程 postmortem 分析专家。
            
            ## 任务
            分析本次 Release 中的所有 fix commits，生成一份详尽的 postmortem 报告。
            
            ## 步骤
            1. 获取本次 Release 的版本号和范围
               - 运行: `git describe --tags --abbrev=0` 获取当前 tag
               - 运行: `git tag --sort=-version:refname | head -2` 获取上一个 tag
               - 运行: `git log <prev-tag>..<curr-tag> --oneline --grep="fix"` 获取 fix commits
            
            2. 分析每个 fix commit
               - 运行: `git show <commit-hash>` 查看详细变更
               - 提取问题类型、根因、修复方案
            
            3. 生成 postmortem 报告
               - 文件名: `postmortem/YYYY-MM-DD-release-<tag>.md`
               - 包含: 问题概述、根因分析、修复方案、预防措施、检测模式
            
            4. 更新索引
               - 更新 `postmortem/README.md` 中的报告列表
            
            5. 创建 PR
               - 分支名: `postmortem/<tag>`
               - 提交变更
        env:
          OPENAI_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          OPENAI_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1