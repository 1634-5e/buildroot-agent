name: Postmortem Generator

on:
  workflow_dispatch:  # 测试用，合并前改回 push: branches: [main]
  # push:
  #   branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run OpenCode Postmortem Generator
        uses: anomalyco/opencode/github@latest
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: bailian/glm-5
          use_github_token: true
          prompt: |
            你是软件工程 postmortem 分析专家。
            
            ## 任务
            分析刚刚合并到 main 的变更，生成复盘报告。
            
            ## 获取变更信息
            1. 获取最新 commit: `git log -1 --pretty=format:"%H %s"`
            2. 查看变更内容: `git show HEAD --stat`
            3. 如果是 PR merge，尝试获取 PR 信息: `gh pr list --state merged --limit 1 --json number,title,url`
            
            ## 生成报告
            - 文件名: `postmortem/YYYY-MM-DD-<short-sha>.md`
            - 包含: 变更概述、影响分析、风险点、建议
            - 如果是 bug fix，额外包含根因分析和预防措施
            
            4. 更新 `postmortem/README.md` 索引
            
            5. 创建 PR 分支并提交变更（main 有保护，不能直接 push）