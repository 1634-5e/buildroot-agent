# Postmortem Check - 自动检测 + 修复闭环
# 在 PR 时检查是否触发历史 postmortem，并可自动修复

name: Postmortem Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-postmortem-triggers:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run OpenCode Analysis & Auto-Fix
        uses: anomalyco/opencode/github@latest
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: bailian/glm-5
          use_github_token: true
          prompt: |
            你是代码安全审查专家。请执行以下任务：
            
            ## 任务1: 检测问题
            1. 读取 ./postmortem/ 目录下的所有历史问题报告
            2. 获取本次 PR 的代码变更: `git diff origin/${{ github.base_ref }}...HEAD`
            3. 分析是否有代码触发了历史问题模式（XSS、并发、内存安全、SQL注入等）
            
            ## 任务2: 如果发现问题，自动修复
            如果检测到问题：
            1. 直接修改代码修复问题（但不要修改 .github/workflows/ 目录下的文件）
            2. 运行测试验证修复
            3. 提交修复到当前分支
            
            ## 任务3: 输出报告
            在 PR 中评论：
            - 是否检测到问题
            - 问题详情和位置
            - 修复状态（已自动修复 / 需要人工处理）
            
            如果需要修改 workflow 文件，或者无法自动修复，明确说明问题和建议的修复方案。
            
            **重要**：如果存在需要人工处理的问题，在评论末尾添加一行：
            > 🔔 @${{ github.event.pull_request.user.login }} 请处理上述问题
            
            关键原则：
            - 优先自动修复业务代码
            - .github/workflows/ 文件禁止自动修改，需要时提示人工介入

      - name: Create Fix PR if needed
        if: failure()
        run: |
          # 如果 OpenCode 失败，通知人工处理
          echo "OpenCode analysis failed, need manual review"
          echo "::warning::Postmortem check failed, please review manually"
