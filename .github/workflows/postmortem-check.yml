# Postmortem Check - 使用 OpenCode 进行 AI 代码审查
# 在 PR 时检查是否触发历史 postmortem 问题

name: Postmortem Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # 方式1: 自动触发 - 每个 PR 都会检查
  check-postmortem:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OpenCode Postmortem Check
        uses: anomalyco/opencode/github@latest
        env:
          # 使用百炼或其他 OpenAI 兼容 API
          OPENAI_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          OPENAI_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
          OPENCODE_MODEL: ${{ secrets.BAILIAN_MODEL || 'qwen-coder-plus' }}
        with:
          prompt: |
            你是代码审查专家。请分析这个 PR 的代码变更是否会触发历史问题。
            
            ## 任务
            1. 读取 ./postmortem/ 目录下的所有报告
            2. 分析本次 PR 的代码变更 (git diff)
            3. 检查是否触发了历史问题模式
            4. 在 PR 中评论分析结果
            
            ## 输出格式
            使用 Markdown 格式输出：
            - 🔴 高风险问题
            - 🟡 中风险问题  
            - 🟢 低风险/无问题
            
            每个问题要说明：
            - 问题类型
            - 触发的 postmortem 报告
            - 具体代码位置
            - 修复建议

  # 方式2: 手动触发 - 评论 /opencode review-postmortem
  review-on-comment:
    if: |
      github.event_name == 'issue_comment' && 
      github.event.issue.pull_request && 
      contains(github.event.comment.body, '/opencode') &&
      contains(github.event.comment.body, 'postmortem')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OpenCode Analysis
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          OPENAI_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
          OPENCODE_MODEL: ${{ secrets.BAILIAN_MODEL || 'qwen-coder-plus' }}
        with:
          prompt: |
            用户请求: ${{ github.event.comment.body }}
            
            请执行以下任务：
            1. 分析当前 PR 的代码变更
            2. 对照 ./postmortem/ 目录下的历史问题报告
            3. 检查是否有代码触发了历史问题模式
            4. 提供详细的分析报告和修复建议
            
            输出 Markdown 格式的分析结果。