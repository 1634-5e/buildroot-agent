name: Postmortem Check
'on':
  pull_request:
    branches:
    - main
    types:
    - opened
    - synchronize
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  check-postmortem-triggers:
    runs-on: ubuntu-latest
    environment: ci
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Configure git
      run: 'git config user.name "github-actions[bot]"

        git config user.email "github-actions[bot]@users.noreply.github.com"

        '
    - name: Run OpenCode Analysis & Auto-Fix
      id: analyze
      uses: anomalyco/opencode/github@latest
      env:
        BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        model: bailian/glm-5
        use_github_token: true
        prompt: '你是代码安全审查专家。请执行以下任务：


          ## 任务1: 检测问题

          1. 读取 ./postmortem/ 目录下的所有历史问题报告

          2. 获取本次 PR 的代码变更: `git diff origin/${{ github.base_ref }}...HEAD`

          3. 分析是否有代码触发了历史问题模式（XSS、并发、内存安全、SQL注入等）


          ## 任务2: 如果发现问题，自动修复

          如果检测到问题：

          1. 直接修改代码修复问题（但不要修改 .github/workflows/ 目录下的文件）

          2. 运行测试验证修复

          3. 提交修复到当前分支


          ## 任务3: 输出报告并决定退出码

          在 PR 中评论分析结果。


          **退出码规则**：

          - 没发现问题，或所有问题已自动修复 -> exit 0

          - 发现需要人工处理的问题 -> exit 1（workflow 将失败并阻止合并）


          这确保了：检测到风险问题时，PR 无法合并，必须人工介入。


          关键原则：

          - 优先自动修复业务代码

          - .github/workflows/ 文件禁止自动修改

          - 需要人工处理时，明确说明问题并让 workflow 失败'
    - name: Generate Postmortem Report
      if: success()
      uses: anomalyco/opencode/github@latest
      env:
        BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        model: bailian/glm-5
        use_github_token: true
        prompt: "你是资深 SRE 工程师，负责撰写专业的 postmortem 报告。\n\n## 任务\n1. 获取本次 PR 的所有变更:\n   - 运行 `git diff origin/${{ github.base_ref }}...HEAD` 查看 PR 变更\n   - 运行 `git log origin/${{ github.base_ref }}..HEAD --oneline` 查看所有提交\n2. 分析这些变更是否解决了某类问题（安全漏洞、并发问题、内存安全等）\n3. 如果是问题修复类的 PR，生成一份专业详尽的 postmortem 报告\n   如果是普通功能开发 PR，跳过不生成\n\n## Postmortem 报告格式\n保存到 `./postmortem/YYYY-MM-DD-<brief-title>.md`，内容包括：\n\n### 问题概述\n- 问题类型（安全漏洞/并发问题/内存安全等）\n- 影响范围\n- 触发条件\n\n### 根本原因分析\n- 代码层面的原因\n- 为什么历史检查没能发现\n\n### 修复方案\n- 具体修复代码和原理\n- 相关 commit hash\n\n### 预防措施\n- 代码规范建议\n- 测试覆盖建议\n- Code review 检查点\n\n### 相关链接\n- PR 链接\n- 相关 issue（如有）\n\n4. 将 postmortem 文件提交到当前分支"

