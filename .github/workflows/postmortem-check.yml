name: Postmortem Check
'on':
  pull_request:
    branches:
    - main
    types:
    - opened
    - synchronize
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  check-postmortem-triggers:
    runs-on: ubuntu-latest
    environment: ci
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
    - name: Run OpenCode Analysis & Auto-Fix
      id: analyze
      uses: anomalyco/opencode/github@latest
      env:
        BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        model: bailian/glm-5
        use_github_token: true
        prompt: |
          你是代码安全审查专家。执行审查前必须完成前置检查。

          ## 前置检查（必须先执行）

          1. 获取 PR 已有评论:
             ```bash
             gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json comments
             ```
          
          2. 获取当前 commit SHA:
             ```bash
             git rev-parse HEAD
             ```
          
          3. 在评论中搜索格式 `<!-- CHECK_META: {...} -->`，解析 JSON：
             - `check`: 检查类型 (security/postmortem)
             - `commit`: 对应的 commit SHA
             - `files_hash`: 变更文件的 hash
          
          4. 去重逻辑：
             - 同 commit + 同检查类型已存在 → 输出一行并退出 0:
               `✅ 安全审查已有结果 (commit abc123)`
             - 不同 commit → 继续执行

          ## 变更感知路由

          1. 获取本次变更:
             ```bash
             git diff origin/${{ github.base_ref }}...HEAD --name-only
             ```
          
          2. 根据变更决定检查范围:

             | 变更类型 | 需执行的检查 |
             |---------|-------------|
             | 纯 .md 文件 | 跳过安全审查，输出 `✅ 纯文档变更，无需安全审查` |
             | 包含 C 代码 | 内存安全 + 并发检查 |
             | 包含 Python | 并发安全 + 类型检查 |
             | 包含 JS/TS | XSS + 前端安全 |
             | 包含 workflow | CI 配置检查 |

          3. 只针对变更文件执行检查，不要扫描整个项目。

          ## 安全审查（仅当需要时执行）

          1. 读取 ./postmortem/ 目录下的历史问题报告
          2. 检查变更代码是否触发历史问题模式
          3. 如发现问题，自动修复并提交

          ## 评论格式

          **通过时 - 一行搞定:**
          `✅ 安全审查通过 — 纯文档变更`

          **或:**
          `✅ 安全审查通过 — 变更文件已检查，未触发历史问题模式`

          **发现问题时 - 简洁报告:**
          ```
          ⚠️ 发现问题：[问题类型]
          
          - 文件: xxx
          - 问题: xxx
          - 建议: xxx
          
          <!-- CHECK_META: {"check":"security","commit":"abc123","files_hash":"sha256:..."} -->
          ```

          **禁止:**
          - ❌ 通过时列出"无 C 代码变更"等废话
          - ❌ 每次重复历史问题表格
          - ❌ 粘贴完整检查清单

          ## 退出码

          - 无问题或已修复 → exit 0
          - 需人工处理 → exit 1

    - name: Generate Postmortem Report
      if: success()
      uses: anomalyco/opencode/github@latest
      env:
        BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        model: bailian/glm-5
        use_github_token: true
        prompt: |
          你是 SRE 工程师，负责判断是否需要生成 postmortem 报告。

          ## 前置检查

          1. 获取已有评论，检查是否存在 `<!-- CHECK_META: {"check":"postmortem",...} -->`
          2. 同 commit 已检查 → 输出 `✅ Postmortem 检查已完成` 并退出 0

          ## 变更分析

          ```bash
          git diff origin/${{ github.base_ref }}...HEAD --name-only
          git log origin/${{ github.base_ref }}..HEAD --oneline
          ```

          ## 快速判断

          变更类型判断：
          - 纯文档/配置变更 → 输出 `✅ 纯文档变更，无需 postmortem` 并退出 0
          - 功能开发 PR → 输出 `✅ 功能开发类 PR，无需 postmortem` 并退出 0
          - Bug 修复/安全修复 → 继续生成报告

          ## Postmortem 报告（仅修复类 PR）

          保存到 `./postmortem/YYYY-MM-DD-<brief-title>.md`：

          ### 问题概述
          - 问题类型 | 影响范围 | 触发条件

          ### 根因分析
          - 代码原因 | 为何未被发现

          ### 修复方案
          - 修复代码 | commit hash

          ### 预防措施
          - 规范建议 | 测试覆盖 | Review 检查点

          提交到当前分支。