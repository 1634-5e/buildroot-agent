name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Server 端 Python 测试
  test-server:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./buildroot-server

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |-
          ~/.local/share/uv
          ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('buildroot-server/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Install dependencies
      run: uv sync

    - name: Run code quality checks
      run: |
        uv run ruff check .
        uv run ruff format --check .
        # uv run mypy .  # Temporarily disabled due to duplicate module issues

    - name: Check protocol sync
      run: |
        cd ..
        python scripts/check_protocol_sync.py

    - name: Run tests with coverage
      run: |
        uv run pytest tests/ -v  --cov=. --cov-report=xml --cov-report=html --cov-fail-under=35 || exit 1

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./buildroot-server/coverage.xml
        flags: server
        name: server-coverage
        fail_ci_if_error: false

  # Agent 端 C 代码检查
  test-agent:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@v1.4.3
      with:
        packages: cmake gcc libssl-dev libjson-c-dev
        version: ubuntu-22.04

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc libssl-dev libjson-c-dev

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: buildroot-agent/build
        key: ${{ runner.os }}-cmake-${{ hashFiles('buildroot-agent/src/*.c', 'buildroot-agent/include/*.h') }}
        restore-keys: |
          ${{ runner.os }}-cmake-

    - name: Build Agent
      run: |
        cd buildroot-agent
        mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Debug
        make -j$(nproc)

    - name: Check compilation warnings
      run: |
        cd buildroot-agent/build
        make 2>&1 | grep -i warning || true

    - name: Run Agent tests
      run: |
        cd buildroot-agent/build
        make test || echo "Tests not yet implemented"

  # Web 端代码检查
  test-web:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: buildroot-web/package.json

    - name: Install dependencies
      run: |
        cd buildroot-web
        npm ci

    - name: Run Web tests
      run: |
        cd buildroot-web
        npm test

    - name: Check Web build
      run: |
        cd buildroot-web
        npm run build

  # 统一测试脚本验证
  test-unified:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Verify test script
      run: |
        chmod +x scripts/test.sh
        ./scripts/test.sh --list

  # PR 审查：安全检查 + Postmortem 管理
  pr-review:
    needs: [test-server, test-agent, test-web, test-unified]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run PR Review
      uses: anomalyco/opencode/github@latest
      env:
        BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        model: bailian/glm-5
        use_github_token: true
        prompt: |
          你是 PR 审查助手。职责：安全审查 + Postmortem 管理。

          ## 流程

          1. 去重：检查已有评论，github-actions 已审查过则跳过
          2. 路由：根据变更类型决定检查范围（纯文档/配置可跳过）
          3. 安全审查：对照 postmortem/*.md 历史问题，检查变更文件
          4. Postmortem：修复类 PR 生成报告，其他跳过

          ## 输出原则

          - 结果导向：无需人工处理就简洁，需要处理就说清楚
          - 一条评论
          - 不要链接、图片、HTML

          ## 退出码

          - exit 0：通过或已自动修复
          - exit 1：需人工处理