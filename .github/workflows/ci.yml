name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Server 端 Python 测试
  test-server:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./buildroot-server

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |-
          ~/.local/share/uv
          ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('buildroot-server/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Install dependencies
      run: uv sync

    - name: Run code quality checks
      run: |
        uv run ruff check .
        uv run ruff format --check .
        # uv run mypy .  # Temporarily disabled due to duplicate module issues

    - name: Check protocol sync
      run: |
        cd ..
        python scripts/check_protocol_sync.py

    - name: Run tests with coverage
      run: |
        uv run pytest tests/ -v  --cov=. --cov-report=xml --cov-report=html --cov-fail-under=35 || exit 1

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./buildroot-server/coverage.xml
        flags: server
        name: server-coverage
        fail_ci_if_error: false

  # Agent 端 C 代码检查
  test-agent:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@v1.4.3
      with:
        packages: cmake gcc libssl-dev libjson-c-dev
        version: ubuntu-22.04

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc libssl-dev libjson-c-dev

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: buildroot-agent/build
        key: ${{ runner.os }}-cmake-${{ hashFiles('buildroot-agent/src/*.c', 'buildroot-agent/include/*.h') }}
        restore-keys: |
          ${{ runner.os }}-cmake-

    - name: Build Agent
      run: |
        cd buildroot-agent
        mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Debug
        make -j$(nproc)

    - name: Check compilation warnings
      run: |
        cd buildroot-agent/build
        make 2>&1 | grep -i warning || true

    - name: Run Agent tests
      run: |
        cd buildroot-agent/build
        make test || echo "Tests not yet implemented"

  # Web 端代码检查
  test-web:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: buildroot-web/package.json

    - name: Install dependencies
      run: |
        cd buildroot-web
        npm ci

    - name: Run Web tests
      run: |
        cd buildroot-web
        npm test

    - name: Check Web build
      run: |
        cd buildroot-web
        npm run build

  # 统一测试脚本验证
  test-unified:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Verify test script
      run: |
        chmod +x scripts/test.sh
        ./scripts/test.sh --list

  # Postmortem 检查 - 作为 CI 的一部分
  postmortem-check:
    needs: [test-server, test-agent, test-web, test-unified]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run Postmortem Check
      uses: anomalyco/opencode/github@latest
      env:
        BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        model: bailian/glm-5
        use_github_token: true
        prompt: |
          你是软件工程 postmortem 检查者。
          
          ## 任务
          分析 PR #${{ github.event.pull_request.number }} 的变更，判断是否需要更新 postmortem 知识库。
          
          ## 步骤
          
          ### 1. 获取 PR 信息
          ```bash
          gh pr view ${{ github.event.pull_request.number }} --json title,body,files,commits
          gh pr diff ${{ github.event.pull_request.number }}
          ```
          
          ### 2. 扫描现有 postmortem
          ```bash
          ls -la postmortem/*.md 2>/dev/null || echo "No postmortem files"
          cat postmortem/README.md 2>/dev/null || echo "No README"
          ```
          
          ### 3. 判断是否需要更新 postmortem
          
          **需要更新的情况：**
          - Bug 修复 → 追加到相关类别
          - 有教育意义的架构决策 → 记录设计模式
          - 性能问题修复 → 记录优化经验
          - 安全相关修复 → 记录安全模式
          
          **不需要更新的情况：**
          - 纯文档变更
          - 小型配置调整
          - 依赖版本更新
          - 测试用例添加
          - 代码格式/风格调整
          
          ### 4. 执行操作
          
          **如果需要更新：**
          1. 更新对应的 postmortem 文件
          2. 更新 README 索引（如有）
          3. 创建分支并提交：`git checkout -b postmortem/pr-${{ github.event.pull_request.number }}`
          4. 推送并创建 PR 到 main
          5. 评论原 PR 说明已创建 postmortem PR
          
          **如果不需要更新：**
          评论说明原因，例如：
          "✅ Postmortem 检查完成。本次变更属于 [文档/配置/测试] 更新，无需更新 postmortem 知识库。"
          
          ## 原则
          - postmortem 记录**问题模式和预防措施**，不是变更日志
          - 只有有教育意义的变更才记录
          - 优先更新现有文件，避免碎片化
