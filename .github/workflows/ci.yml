name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Server 端 Python 测试
  test-server:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./buildroot-server

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |-
          ~/.local/share/uv
          ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('buildroot-server/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Install dependencies
      run: uv sync

    - name: Run code quality checks
      run: |
        uv run ruff check .
        uv run ruff format --check .
        # uv run mypy .  # Temporarily disabled due to duplicate module issues

    - name: Check protocol sync
      run: |
        cd ..
        python scripts/check_protocol_sync.py

    - name: Run tests with coverage
      run: |
        uv run pytest tests/ -v  --cov=. --cov-report=xml --cov-report=html --cov-fail-under=35 || exit 1

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./buildroot-server/coverage.xml
        flags: server
        name: server-coverage
        fail_ci_if_error: false

  # Agent 端 C 代码检查
  test-agent:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@v1.4.3
      with:
        packages: cmake gcc libssl-dev libjson-c-dev
        version: ubuntu-22.04

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc libssl-dev libjson-c-dev

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: buildroot-agent/build
        key: ${{ runner.os }}-cmake-${{ hashFiles('buildroot-agent/src/*.c', 'buildroot-agent/include/*.h') }}
        restore-keys: |
          ${{ runner.os }}-cmake-

    - name: Build Agent
      run: |
        cd buildroot-agent
        mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Debug
        make -j$(nproc)

    - name: Check compilation warnings
      run: |
        cd buildroot-agent/build
        make 2>&1 | grep -i warning || true

    - name: Run Agent tests
      run: |
        cd buildroot-agent/build
        make test || echo "Tests not yet implemented"

  # Web 端代码检查
  test-web:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: buildroot-web/package.json

    - name: Install dependencies
      run: |
        cd buildroot-web
        npm ci

    - name: Run Web tests
      run: |
        cd buildroot-web
        npm test

    - name: Check Web build
      run: |
        cd buildroot-web
        npm run build

  # 统一测试脚本验证
  test-unified:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Verify test script
      run: |
        chmod +x scripts/test.sh
        ./scripts/test.sh --list

  # PR 审查：安全检查 + Postmortem 管理
  pr-review:
    needs: [test-server, test-agent, test-web, test-unified]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run PR Review
      uses: anomalyco/opencode/github@latest
      env:
        BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        model: bailian/glm-5
        use_github_token: true
        prompt: |
          你是 PR 审查助手，负责：安全审查 + Postmortem 管理。只发一条评论。

          ## 前置检查（必须先执行）

          1. 获取 PR 已有评论和当前 commit:
             ```bash
             gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json comments
             git rev-parse HEAD
             ```
          
          2. 去重：如果 github-actions 已发过审查评论（"✅ 审查通过" 或 "⚠️"），跳过并退出 0

          ## 变更感知路由

          1. 获取变更文件:
             ```bash
             git diff origin/${{ github.base_ref }}...HEAD --name-only
             ```
          
          2. 根据变更类型决定检查:

             | 变更类型 | 安全检查 | Postmortem |
             |---------|---------|-----------|
             | 纯 .md 文件 | 跳过 | 跳过 |
             | 纯 workflow | 跳过 | 跳过 |
             | C 代码 | 内存安全+并发 | 修复类检查 |
             | Python | 类型+并发 | 修复类检查 |
             | JS/TS | XSS+前端安全 | 修复类检查 |
             | 混合 | 按类型组合 | 修复类检查 |

          ## 安全审查（仅当需要时）

          1. 读取 `./postmortem/*.md` 中的历史问题模式
          2. 只检查变更文件，不扫描全项目
          3. 发现问题 → 自动修复并提交（不修改 .github/workflows/）

          ## Postmortem 管理

          **需要生成报告的情况：**
          - Bug 修复类 PR
          - 安全漏洞修复
          - 性能问题修复

          **不需要的情况：**
          - 功能开发
          - 文档变更
          - 配置调整
          - 重构（无行为变更）

          如需生成，创建 `./postmortem/YYYY-MM-DD-<title>.md`，包含：
          - 问题概述（类型/影响/触发条件）
          - 根因分析
          - 修复方案 + commit hash
          - 预防措施

          ## 输出格式（一条评论）

**无需处理：**
          ```
          ✅ 审查通过
          ```

          **发现需处理的问题：**
          ```
          ⚠️ [问题类型]：[一句话描述]

          - 文件: xxx
          - 建议: xxx
          ```

          ## 禁止

          - ❌ 输出多余废话（审查通过就是通过，不需要解释为什么）
          - ❌ 添加链接、图片、HTML
          - ❌ 分多条评论

          ## 退出码

          - 无问题或已修复 → exit 0
          - 需人工处理 → exit 1（阻止合并）