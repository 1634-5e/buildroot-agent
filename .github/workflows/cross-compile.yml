name: Cross Compile Buildroot Agent

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  cross-compile:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf cmake make

    - name: Build
      working-directory: buildroot-agent
      run: |
        mkdir -p build && cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=cmake/arm-github-actions.cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DSTATIC_LINK=ON
        make -j$(nproc)

    - name: Verify ARM binary
      working-directory: buildroot-agent
      run: |
        file build/bin/buildroot-agent | grep -q ARM
        echo "Binary verified as ARM architecture"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: buildroot-agent-arm
        path: buildroot-agent/build/bin/buildroot-agent
